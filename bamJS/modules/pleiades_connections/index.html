<!DOCTYPE html>

<head>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no' />
    <!-- Mapbox includes below -->
    <script src='https://api.mapbox.com/mapbox.js/v2.2.2/mapbox.js'></script>
    <link href='https://api.mapbox.com/mapbox.js/v2.2.2/mapbox.css' rel='stylesheet' />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script src="http://d3js.org/d3.v3.js"></script>


</head>
<meta charset="utf-8">
<!-- Will split off css when done with testing -->
<style>
    .node circle {
        stroke: grey;
        stroke-width: 10px;
    }
    
    .link {
        stroke: black;
        stroke-width: 1px;
        opacity: .2;
    }
    
    .label {
        font-family: Arial;
        font-size: 12px;
    }
    
    #map {
        height: 98vh;
    }
    
    #attributepane {
        display: block;
        display: none;
        position: absolute;
        height: auto;
        bottom: 20%;
        top: 20%;
        right: 0;
        width: 240px;
        background-color: #fff;
        margin: 0;
        background-color: rgba(255, 255, 255, 0.8);
        border-left: 1px solid #ccc;
        padding: 18px 18px 18px 18px;
        z-index: 8998;
        overflow: scroll;
    }
</style>

<body>
    <div id='attributepane'></div>
    <div id='map'>
    </div>

    <script>

        //map from AWMC tiles

        var map = L.mapbox.map('map', 'isawnyu.map-knmctlkh', {
            accessToken: 'pk.eyJ1IjoiaXNhd255dSIsImEiOiJBWEh1dUZZIn0.SiiexWxHHESIegSmW8wedQ'
        });

        //set the initial view. This is pretty standard for most of the ancient med. projects
        map.setView([40.58058, 36.29883], 4);

        var force = d3.layout.force()
            .charge(-120)
            .linkDistance(30);

        /* Initialize the SVG layer */
        map._initPathRoot();

        /* We simply pick up the SVG from the map object */
        var svg = d3.select("#map").select("svg"),
            g = svg.append("g");

        //the json file is just standard output from Gephi
        d3.json("connections.json", function(error, json) {

            if (error) throw error;

            //fix up the data so it is what we want for d3
            json.nodes.forEach(function(d) {
                //convert the rgb colors to hex for d3
                var a = d.color.split("(")[1].split(")")[0];
                a = a.split(",");

                var b = a.map(function(x) { //For each array element
                    x = parseInt(x).toString(16); //Convert to a base16 string
                    return (x.length == 1) ? "0" + x : x; //Add zero if we get only one character
                })
                b = "#" + b.join("");
                d.color = b;

                //next, put in dummy values to catch non-geographic nodes.

                if (!("lon" in d.attributes) == true) {
                    //if there is no geography, then allow the node to float around
                    d.LatLng = new L.LatLng(0, 0);
                    d.fixed = false;
                } else //there is geography, so place the node where it goes
                {
                    d.LatLng = new L.LatLng(d.attributes.lat, d.attributes.lon);
                    d.fixed = true;
                    d.x = map.latLngToLayerPoint(d.LatLng).x;
                    d.y = map.latLngToLayerPoint(d.LatLng).y;
                }
            })

            var edges = [];
            json.edges.forEach(function(e) {
                var sourceNode = json.nodes.filter(function(n) {
                        return n.id === e.source;
                    })[0],
                    targetNode = json.nodes.filter(function(n) {
                        return n.id === e.target;
                    })[0];

                edges.push({
                    source: sourceNode,
                    target: targetNode,
                    value: e.Value
                });
            });

            var link = svg.selectAll(".link")
                .data(edges)
                .enter().append("line")
                .attr("class", "link");

            var node = svg.selectAll(".node")
                .data(json.nodes)
                .enter().append("circle")
                //display nodes and information when a node is clicked on
                //for some reason the click event is not registering, but mousedown and mouseover are.
                .on("mouseover", function(d) {

                    //put in blank values if there are no attributes
                    var titleForBox, imageForBox, descriptionForBox = '';
                    titleForBox = '<h1>' + d.label + '</h1>';

                    if (typeof d.attributes.Description != "undefined") {
                        descriptionForBox = d.attributes.Description;
                    } else {
                        descriptionForBox = '';
                    }

                    if (typeof d.attributes.image != "undefined") {
                        imageForBox = '<img src="' + d.attributes.image + '" align="left">';
                    } else {
                        imageForBox = '';
                    }

                    var htmlForBox = imageForBox + ' ' + titleForBox + descriptionForBox;
                    document.getElementById("attributepane").innerHTML = htmlForBox;
                    toggle_visibility('attributepane');
                })
                .style("stroke", "black")
                .style("opacity", .6)
                .attr("r", function(d) {
                    return d.size * 2;
                })
                .style("fill", function(d) {
                    return d.color;
                })
                .call(force.drag);



            //for when the map changes viewpoint
            map.on("viewreset", update);
            update();

            function update() {

                node.attr("transform",
                    function(d) {
                        if (d.fixed == true) {
                            d.x = map.latLngToLayerPoint(d.LatLng).x;
                            d.y = map.latLngToLayerPoint(d.LatLng).y;
                            return "translate(" +
                                map.latLngToLayerPoint(d.LatLng).x + "," +
                                map.latLngToLayerPoint(d.LatLng).y + ")";
                        }
                    }
                );

                link.attr("x1", function(d) {
                        return d.source.x;
                    })
                    .attr("y1", function(d) {
                        return d.source.y;
                    })
                    .attr("x2", function(d) {
                        return d.target.x;
                    })
                    .attr("y2", function(d) {
                        return d.target.y;
                    });

                node.attr("cx", function(d) {
                        if (d.fixed == false) {
                            return d.x;
                        }
                    })
                    .attr("cy", function(d) {
                        if (d.fixed == false) {
                            return d.y;
                        }
                    })

                //this kickstarts the simulation, so the nodes will realign to a zoomed state
                force.start();
            }

            force
                .links(edges)
                .nodes(json.nodes)
                .start();
            force.on("tick", update);

        }); //end
        
                function toggle_visibility(id) {
            var e = document.getElementById(id);
            if (e.style.display == 'block')
                e.style.display = 'none';
            else
                e.style.display = 'block';
        }
    </script>
</body>
