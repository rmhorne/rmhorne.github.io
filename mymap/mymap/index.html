<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css" />
        <link rel="stylesheet" type="text/css" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/MarkerCluster.css" />
        <link rel="stylesheet" href="css/MarkerCluster.Default.css" />
        <link rel="stylesheet" href="css/leaflet-search.css" />
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>Community Status in the Bellum Asiaticum</title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/leaflet-heat.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/OSMBuildings-Leaflet.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/leaflet.markercluster.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/Cities0.js"></script>
        <script>
        L.ImageOverlay.include({
            getBounds: function () {
                return this._bounds;
            }
        });
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[32.9069505025,15.8911606688],[45.5058677453,32.5004890688]]);
        var hash = new L.Hash(map);
        map.attributionControl.addAttribution('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a>');
        var bounds_group = new L.featureGroup([]);
        var basemap0 = L.tileLayer('http://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="http://openstreetmap.org">OpenStreetMap</a> contributors,<a href="http://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>',
            maxZoom: 28
        });
        basemap0.addTo(map);
        var basemap1 = L.tileLayer('http://a.tile.stamen.com/toner/{z}/{x}/{y}.png', {
            attribution: 'Map tiles by <a href="http://stamen.com">Stamen Design</a>,<a href="http://creativecommons.org/licenses/by/3.0">CC BY 3.0</a> &mdash; Mapdata: &copy; <a href="http://openstreetmap.org">OpenStreetMap</a>contributors,<a href="http://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>',
            maxZoom: 28
        });
        basemap1.addTo(map);
        var basemap2 = L.tileLayer('http://openmapsurfer.uni-hd.de/tiles/roads/x={x}&y={y}&z={z}', {
            attribution: 'Imagery from <a href="http://giscience.uni-hd.de/">GIScience Research Group @University of Heidelberg</a> &mdash; Map data:&copy; <a href="http://openstreetmap.org">OpenStreetMap</a> contributors,<a href="http://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>',
            maxZoom: 28
        });
        basemap2.addTo(map);
        var basemap3 = L.tileLayer('http://a.tile.stamen.com/terrain/{z}/{x}/{y}.png', {
            attribution: 'Map tiles by <a href="http://stamen.com">Stamen Design</a>,<a href="http://creativecommons.org/licenses/by/3.0">CC BY 3.0</a> &mdash;Map data: &copy; <a href="http://openstreetmap.org">OpenStreetMap</a>contributors,<a href="http://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>',
            maxZoom: 28
        });
        basemap3.addTo(map);
        var basemap4 = L.tileLayer('http://a.tile.stamen.com/watercolor/{z}/{x}/{y}.png', {
            attribution: 'Map tiles by <a href="http://stamen.com">Stamen Design</a>,<a href="http://creativecommons.org/licenses/by/3.0">CC BY 3.0</a> &mdash;Map data: &copy; <a href="http://openstreetmap.org">OpenStreetMap</a>contributors,<a href="http://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>',
            maxZoom: 28
        });
        basemap4.addTo(map);
        function setBounds() {
        }
        function geoJson2heat(geojson, weight) {
          return geojson.features.map(function(feature) {
            return [
              feature.geometry.coordinates[1],
              feature.geometry.coordinates[0],
              feature.properties[weight]
            ];
          });
        }
        function pop_Cities0(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Community</th>\
                        <td>' + (feature.properties['Community'] !== null ? Autolinker.link(String(feature.properties['Community'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">pid</th>\
                        <td>' + (feature.properties['pid'] !== null ? Autolinker.link(String(feature.properties['pid'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">x</th>\
                        <td>' + (feature.properties['x'] !== null ? Autolinker.link(String(feature.properties['x'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">y</th>\
                        <td>' + (feature.properties['y'] !== null ? Autolinker.link(String(feature.properties['y'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Source</th>\
                        <td>' + (feature.properties['Source'] !== null ? Autolinker.link(String(feature.properties['Source'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Source Type</th>\
                        <td>' + (feature.properties['Source Type'] !== null ? Autolinker.link(String(feature.properties['Source Type'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Status</th>\
                        <td>' + (feature.properties['Status'] !== null ? Autolinker.link(String(feature.properties['Status'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Certain (Status)</th>\
                        <td>' + (feature.properties['Certain (Status)'] !== null ? Autolinker.link(String(feature.properties['Certain (Status)'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Willing</th>\
                        <td>' + (feature.properties['Willing'] !== null ? Autolinker.link(String(feature.properties['Willing'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Certain (willing)</th>\
                        <td>' + (feature.properties['Certain (willing)'] !== null ? Autolinker.link(String(feature.properties['Certain (willing)'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Start</th>\
                        <td>' + (feature.properties['Start'] !== null ? Autolinker.link(String(feature.properties['Start'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">End</th>\
                        <td>' + (feature.properties['End'] !== null ? Autolinker.link(String(feature.properties['End'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Pleiades ID</th>\
                        <td>' + (feature.properties['Pleiades ID'] !== null ? Autolinker.link(String(feature.properties['Pleiades ID'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Notes</th>\
                        <td>' + (feature.properties['Notes'] !== null ? Autolinker.link(String(feature.properties['Notes'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">pleiades instructions</th>\
                        <td>' + (feature.properties['pleiades instructions'] !== null ? Autolinker.link(String(feature.properties['pleiades instructions'])) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent);
        }

        function style_Cities0(feature) {
            switch(feature.properties['Status']) {
                case 'Anti-Aristonikos':
                    return {
                pane: 'pane_Cities0',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(0,0,0,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fillOpacity: 1,
                fillColor: 'rgba(255,255,255,1.0)',
            }
                    break;
                case 'Anti-Roman':
                    return {
                pane: 'pane_Cities0',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(0,0,0,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fillOpacity: 1,
                fillColor: 'rgba(255,0,0,1.0)',
            }
                    break;
                case 'Anti-Rome':
                    return {
                pane: 'pane_Cities0',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(0,0,0,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fillOpacity: 1,
                fillColor: 'rgba(255,0,0,1.0)',
            }
                    break;
            }
        }
        map.createPane('pane_Cities0');
        map.getPane('pane_Cities0').style.zIndex = 600;
        map.getPane('pane_Cities0').style['mix-blend-mode'] = 'normal';
        var layer_Cities0 = new L.geoJson(json_Cities0, {
            attribution: '<a href=""></a>',
            pane: 'pane_Cities0',
            onEachFeature: pop_Cities0,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_Cities0(feature)).bindTooltip((feature.properties['Community'] !== null?String('<div style="color: #000000; font-size: 13pt; font-family: \'.SF NS Text\', sans-serif;">' + feature.properties['Community']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_Cities0'}).openTooltip();
            }
        });
        bounds_group.addLayer(layer_Cities0);
        map.addLayer(layer_Cities0);
        var title = new L.Control();
        title.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        title.update = function () {
            this._div.innerHTML = '<h2>Community Status in the Bellum Asiaticum</h2>';
        };
        title.addTo(map);
        setBounds();
        map.addControl(new L.Control.Search({
            layer: layer_Cities0,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'Community'}));
        </script>
    </body>
</html>
